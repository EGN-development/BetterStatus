services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bstatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bstatus}
      POSTGRES_DB: ${POSTGRES_DB:-better_status}
    volumes:
      - bstatus_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bstatus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bstatus}:${POSTGRES_PASSWORD:-bstatus}@db:5432/${POSTGRES_DB:-better_status}?schema=public
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      # ADMIN_PASSWORD: optional — random if unset (printed in logs on first run)
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  bstatus_db:
